<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7733cc"/>
      <stop offset="100%" stop-color="#2211aa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgA)"/>
  <!-- Wire -->
  <rect x="248" y="30" width="16" height="110" rx="5" fill="#bbbbbb"/>
  <!-- Shoulder bar -->
  <rect x="190" y="140" width="132" height="28" rx="10" fill="#dddddd"/>
  <!-- Shoulder center bolt -->
  <circle cx="256" cy="154" r="14" fill="#aaaaaa"/>

  <!-- Left arm: wider arc, more circular -->
  <path d="M 220 168 C 150 220, 150 320, 230 365" stroke="#ffcc00" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Left claw tip (hooks inward) -->
  <path d="M 230 365 L 245 352" stroke="#ffaa00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="245" cy="352" r="8" fill="#ee3333"/>

  <!-- Right arm: mirror, wider arc -->
  <path d="M 292 168 C 362 220, 362 320, 282 365" stroke="#ffcc00" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Right claw tip (hooks inward) -->
  <path d="M 282 365 L 267 352" stroke="#ffaa00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="267" cy="352" r="8" fill="#ee3333"/>

  <!-- Star between claws -->
  <text x="218" y="440" font-size="85" font-family="sans-serif">⭐</text>
  <!-- Sparkles -->
  <text x="55" y="110" font-size="45" font-family="sans-serif">✨</text>
  <text x="385" y="130" font-size="35" font-family="sans-serif">✨</text>
  <text x="395" y="440" font-size="38" font-family="sans-serif">🌟</text>
  <text x="42" y="415" font-size="30" font-family="sans-serif">🌟</text>
</svg>
