<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6622aa"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Crane rail -->
  <rect x="80" y="100" width="352" height="12" rx="6" fill="#cccccc"/>
  <!-- Carriage -->
  <rect x="220" y="82" width="72" height="30" rx="6" fill="#dddddd"/>
  <!-- Wire -->
  <rect x="253" y="112" width="6" height="140" fill="#aaaaaa"/>
  <!-- Shoulder joint -->
  <circle cx="256" cy="260" r="18" fill="#cccccc"/>
  <!-- Bolt -->
  <rect x="230" y="254" width="52" height="12" rx="4" fill="#888888"/>
  <!-- Left arm (open outward) -->
  <g transform="rotate(30, 240, 260)">
    <rect x="222" y="260" width="10" height="70" rx="3" fill="#ffcc00"/>
    <circle cx="227" cy="330" r="8" fill="#dddddd"/>
    <rect x="210" y="330" width="8" height="50" rx="3" fill="#ffcc00" transform="rotate(-10, 214, 330)"/>
    <rect x="190" y="375" width="28" height="6" rx="3" fill="#ffaa00"/>
    <rect x="190" y="381" width="28" height="5" rx="2" fill="#dd3333"/>
  </g>
  <!-- Right arm (open outward) -->
  <g transform="rotate(-30, 272, 260)">
    <rect x="280" y="260" width="10" height="70" rx="3" fill="#ffcc00"/>
    <circle cx="285" cy="330" r="8" fill="#dddddd"/>
    <rect x="289" y="330" width="8" height="50" rx="3" fill="#ffcc00" transform="rotate(10, 293, 330)"/>
    <rect x="289" y="375" width="28" height="6" rx="3" fill="#ffaa00"/>
    <rect x="289" y="381" width="28" height="5" rx="2" fill="#dd3333"/>
  </g>
  <!-- Stars decoration -->
  <text x="100" y="460" font-size="50" fill="#FFD700">⭐</text>
  <text x="370" y="180" font-size="35" fill="#FF88CC">✦</text>
  <text x="400" y="440" font-size="40" fill="#6BCB77">✦</text>
  <text x="80" y="180" font-size="30" fill="#4488FF">✦</text>
</svg>
